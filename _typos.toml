# Configuration for `typos` (https://github.com/crate-ci/typos).
# typos honors .gitignore, so build outputs under artifacts/ are already skipped.
[default.extend-words]
# Intentional minimal-difference test data (e.g. KeyedHash("abc") != KeyedHash("abd")).
abd = "abd"
# URL tracking-parameter prefixes stripped by UrlTrackingStripper (not misspellings).
hsa = "hsa"
oly = "oly"
