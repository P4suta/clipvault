name: Feature request
description: Suggest an improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ClipVault is intentionally minimal and privacy-focused (read-only-where-possible, no scope creep, no
        persistent system footprint). Requests that fit that scope are most likely to land.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve? Who hits it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
