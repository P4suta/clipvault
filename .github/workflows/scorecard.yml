# OpenSSF Scorecard: supply-chain posture analysis (token-permissions, pinned deps, dangerous-workflow,
# branch-protection, SAST, ...). Results go to the Security tab and the public OpenSSF Scorecard report.
name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "23 4 * * 2" # weekly, Tuesday 04:23 UTC
  push:
    branches: [main]

# Deny by default at the workflow scope; the one job grants only what it needs.
permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    # Scorecard runs on Linux; it analyzes repository/workflow metadata, not the WinUI build.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload the SARIF results to the Security tab
      id-token: write # publish results to the public OpenSSF Scorecard API
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to the Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
