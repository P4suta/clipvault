# ClipVault toolchain definition (versions pinned for reproducibility).
# Usage: after `mise install` in this directory, run `mise exec -- dotnet ...` / `mise run <task>`.
[tools]
dotnet = "10.0.300"
lefthook = "2.1.9"
just = "1.53.0"
typos = "1.47.2"
# Day-1 lint tooling shared with project-template's house style. Native binaries (no foreign
# runtime), so they install cleanly on a .NET-only machine. Exact versions + checksums are
# recorded in mise.lock.
actionlint = "1.7.12"
"github:crate-ci/committed" = "1.1.11"
# yamllint (Python) and markdownlint-cli2 (Node) are deliberately NOT pinned here: a .NET project
# does not otherwise carry those runtimes. Their `just` recipes no-op locally with an install hint
# and CI installs them to enforce the pass — the same approach the template takes for yamllint.

[settings]
# Record exact tool versions + checksums in mise.lock for reproducible, verifiable installs.
lockfile = true

[env]
# Quiet, reproducible CLI (opt out of telemetry, hide the logo banner).
DOTNET_CLI_TELEMETRY_OPTOUT = "1"
DOTNET_NOLOGO = "1"

# The Justfile is the source of truth for tasks; mise delegates to it (to avoid duplication).
# Both `just <recipe>` and `mise run <task>` behave the same.

[tasks.bootstrap]
description = "One-time onboarding (toolchain + hooks + tools) = just bootstrap"
run = "just bootstrap"

[tasks.build]
description = "Build the app (x64) = just build"
run = "just build"

[tasks.relock]
description = "Regenerate packages.lock.json after dependency changes = just relock"
run = "just relock"

[tasks.outdated]
description = "List dependencies with newer versions = just outdated"
run = "just outdated"

[tasks.run]
description = "Stop -> build -> launch (no install) = just run"
run = "just run"

[tasks.test]
description = "Run all tests = just test"
run = "just test"

[tasks.publish]
description = "Build the self-contained distribution = just publish"
run = "just publish"

[tasks.lint]
description = "All static lint passes (no tests) = just lint"
run = "just lint"

[tasks.audit]
description = "Fail on known-vulnerable dependencies = just audit"
run = "just audit"

[tasks.ci]
description = "CI gate (locked restore + lint + test + audit) = just ci"
run = "just ci"

[tasks.typos]
description = "Spell-check source, configs, and docs = just typos"
run = "just typos"
