# ClipVault toolchain definition (versions pinned for reproducibility).
# Usage: after `mise install` in this directory, run `mise exec -- dotnet ...` / `mise run <task>`.
[tools]
dotnet = "10.0.300"
lefthook = "latest"
just = "latest"
typos = "1.47.2"

[env]
# Quiet, reproducible CLI (opt out of telemetry, hide the logo banner).
DOTNET_CLI_TELEMETRY_OPTOUT = "1"
DOTNET_NOLOGO = "1"

# The justfile is the source of truth for tasks; mise delegates to it (to avoid duplication).
# Both `just <recipe>` and `mise run <task>` behave the same.

[tasks.setup]
description = "One-time onboarding (toolchain + hooks + tools) = just setup"
run = "just setup"

[tasks.build]
description = "Build the app (x64) = just build"
run = "just build"

[tasks.relock]
description = "Regenerate packages.lock.json after dependency changes = just relock"
run = "just relock"

[tasks.outdated]
description = "List dependencies with newer versions = just outdated"
run = "just outdated"

[tasks.run]
description = "Stop -> build -> launch (no install) = just run"
run = "just run"

[tasks.test]
description = "Run all tests = just test"
run = "just test"

[tasks.publish]
description = "Build the self-contained distribution = just publish"
run = "just publish"

[tasks.ci]
description = "CI gate (locked restore + format + lint + test + vuln) = just ci"
run = "just ci"

[tasks.typos]
description = "Spell-check source, configs, and docs = just typos"
run = "just typos"
